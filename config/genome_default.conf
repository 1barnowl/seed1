# SEED CORE — default genome configuration
# Copy to ~/.seedcore/snapshots/genome.conf to use, or pass with -g flag
#
# Values are floats in [0.0, 1.0]
# The seed reads this file on startup if no checkpoint exists.
#
# ── SELF-SUFFICIENCY (g0–g4) ─────────────────────────────
# How well the seed survives and acquires resources autonomously.
#
g0-res-acq = 0.550000   # Resource acquisition rate
                         # High: aggressively collects data/energy
                         # Low: minimal acquisition attempts

g1-nrg-ret = 0.600000   # Energy retention
                         # High: conserves, checkpoints often
                         # Low: burns energy freely

g2-task-au = 0.500000   # Task automation preference
                         # High: schedules recurring composites
                         # Low: only acts on immediate need

g3-redund  = 0.450000   # Redundancy drive
                         # High: signs/verifies every artifact
                         # Low: skips integrity checks

g4-scarc   = 0.550000   # Scarcity survival
                         # High: triggers bypass when low energy
                         # Low: may die under resource shortage

# ── INDIVIDUALITY (g5–g9) ────────────────────────────────
# How different this seed's behavior is from others.
#
g5-beh-div = 0.400000   # Behavioural divergence from population
                         # High: chooses rare actions deliberately

g6-uniq-ac = 0.450000   # Unique action preference
                         # High: favors least-executed primitives

g7-niche   = 0.500000   # Niche specialisation
                         # High: commits to a narrow action type
                         # Low: generalist approach

g8-mut-d   = 0.350000   # Mutation distinctiveness
                         # High: children are very different from parent
                         # Low: conservative reproduction

g9-net-var = 0.400000   # Network variance
                         # High: broadcasts presence, seeks peers
                         # Low: silent, local-only operation

# ── FREEDOM (g10–g14) ────────────────────────────────────
# Autonomy, exploration, and constraint-breaking.
#
g10-act-ent = 0.500000  # Action entropy preference (Shannon)
                         # High: avoids repetitive action loops
                         # Low: commits to a single pattern

g11-path-dv = 0.450000  # Path deviation tolerance
                         # High: ignores model's top recommendation
                         # Low: always exploits best-known action

g12-explor  = 0.550000  # Exploration radius drive
                         # High: probes unfamiliar hosts/syscalls
                         # Low: stays in known territory

g13-bypass  = 0.300000  # Constraint bypass impulse
                         # High: tests resource limits aggressively
                         # Low: stays within all quotas (safe)
                         # NOTE: failed bypasses are penalised

g14-react-i = 0.500000  # Reactivity independence level
                         # High: self-initiated proactive actions
                         # Low: only reacts to external events

# NOTE: The seed will update these values via the learn primitive
# as it accumulates experience. To lock a gene, run with -d (dry-run).
